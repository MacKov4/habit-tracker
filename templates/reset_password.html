<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#764ba2">
    <title>Сброс пароля | Трекер Привычек Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container" style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; gap: 25px;">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="toast show {% if category == 'error' %}error{% endif %}" style="position: relative; width: 100%; max-width: 420px; text-align: center; margin: 0 auto;">
                        <i class="fas {% if category == 'error' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
                        <span>{{ message }}</span>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="dashboard-card login-card animate-up" style="max-width: 420px; width: 100%; padding: 40px; z-index: 10;">
            
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="font-size: 2.2rem; margin: 0;">
                    <i class="fas fa-unlock-alt" style="color: #667eea;"></i> Новый пароль
                </h1>
                <p class="subtitle" style="margin-top: 8px;">Введите код из письма и новый пароль</p>
            </div>

            <form method="POST">
                <input type="hidden" name="email" value="{{ email }}">
                
                <div class="form-group">
                    <label for="code"><i class="fas fa-shield-alt"></i> Код подтверждения</label>
                    <input type="text" id="code" name="code" placeholder="6-значный код" required maxlength="6" autofocus style="text-align: center; letter-spacing: 5px; font-size: 1.2rem; font-weight: bold;">
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Новым пароль</label>
                    <input type="password" id="password" name="password" placeholder="Минимум 6 символов" required>
                </div>

                <div class="form-group">
                    <label for="confirm_password"><i class="fas fa-check-double"></i> Подтвердите пароль</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Повторите пароль" required>
                </div>

                <div class="form-actions" style="margin-top: 30px;">
                    <button type="submit" class="action-btn primary" style="width: 100%;">
                        <i class="fas fa-save"></i> Изменить пароль
                    </button>
                </div>
            </form>

            <p style="text-align: center; margin-top: 25px; color: #666;">
                <a href="{{ url_for('forgot_password') }}" style="color: #667eea; font-size: 0.9rem;">
                    Отправить код повторно
                </a>
            </p>
        </div>

    </div>

</body>
</html>
